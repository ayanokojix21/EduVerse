services:
  # ── MongoDB: Local Data Persistence ──────────────────────────────────────────
  mongodb:
    image: mongo:latest
    container_name: eduverse-db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: always

  # ── Backend: Agentic Core (Cloud Gemma 4 via Google AI Studio) ───────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eduverse-api
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - MONGO_URI=mongodb://mongodb:27017/eduverse
    depends_on:
      - mongodb
    volumes:
      - ./backend/data:/app/data
    restart: on-failure

  # ── RL Server: Shadow Auditing ───────────────────────────────────────────────
  rl-server:
    build:
      context: ./backend
      dockerfile: Dockerfile.rl
    container_name: eduverse-rl
    ports:
      - "8001:8001"
    env_file:
      - ./backend/.env
    environment:
      - MONGO_URI=mongodb://mongodb:27017/eduverse
    depends_on:
      - mongodb
    restart: on-failure

volumes:
  mongodb_data:
