# EduVerse Local-First "Beast Mode" Stack
# Orchestrates: Backend (FastAPI) + Database (MongoDB) + Inference (Ollama)
version: '3.8'

services:
  # ── MongoDB: Local Data Persistence ──────────────────────────────────────────
  mongodb:
    image: mongo:latest
    container_name: eduverse-db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: always

  # ── Backend: Agentic Core ────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eduverse-api
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - MONGO_URI=mongodb://mongodb:27017/eduverse
    depends_on:
      - mongodb
    volumes:
      - ./backend/data:/app/data
      - ./training:/app/training
    restart: on-failure

  # ── RL Server: Shadow Auditing ───────────────────────────────────────────────
  rl-server:
    build:
      context: ./backend
      dockerfile: Dockerfile.rl
    container_name: eduverse-rl
    ports:
      - "8001:8001"
    env_file:
      - ./backend/.env
    environment:
      - MONGO_URI=mongodb://mongodb:27017/eduverse
    depends_on:
      - mongodb
    restart: on-failure

  # ── Ollama: Local Inference (Gemma 4) ────────────────────────────────────────
  # NOTE: Requires Ollama to be installed on the host or run as a container
  # For GPU acceleration, use 'ollama/ollama:latest' with nvidia-docker
  ollama:
    image: ollama/ollama:latest
    container_name: eduverse-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: always

  # ── Automated Model Pull (Hackathon Requirement) ─────────────
  ollama-init:
    image: ollama/ollama:latest
    container_name: eduverse-ollama-init
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=ollama:11434
    entrypoint: >
      sh -c "echo 'Waiting for Ollama to boot...' && sleep 10 && echo 'Pulling Gemma 4 e4b for Hackathon...' && ollama pull gemma4:e4b && echo 'Model Pulled Successfully!'"

volumes:
  mongodb_data:
  ollama_data:
